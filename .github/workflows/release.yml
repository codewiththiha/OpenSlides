name: Release Tauri App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  extract-notes:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.notes.outputs.version }}
      payloadJson: ${{ steps.notes.outputs.payloadJson }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Extract release notes
        id: notes
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: node scripts/extract-release-note.mjs

  build-tauri:
    needs: extract-notes
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - runner: ubuntu-22.04
            args: ''
            rust_targets: ''
          - runner: windows-latest
            args: ''
            rust_targets: ''
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}
      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - name: Build, bundle, and attach release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: OpenSlides ${{ needs.extract-notes.outputs.version }}
          releaseBody: ${{ fromJSON(needs.extract-notes.outputs.payloadJson).fullNotes }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-marketing-site:
    needs: [extract-notes, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Send release notes to the marketing site
        uses: actions/github-script@v7
        env:
          PAYLOAD: ${{ needs.extract-notes.outputs.payloadJson }}
        with:
          # Add WEBSITE_DISPATCH_TOKEN to this repository's Actions secrets. It needs
          # access to codewiththiha/OpenSlidesWebsite and repository_dispatch permission.
          github-token: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'codewiththiha',
              repo: 'OpenSlidesWebsite',
              event_type: 'update_release_notes',
              client_payload: JSON.parse(process.env.PAYLOAD),
            })
